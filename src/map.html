    <!-- FUNCTIONS -->
     <script>

    // Helper function to save dataset info to simpleData.json (async version)
    async function saveDatasetToJSON(fileName, dimensions, variables, overview, coords, attributes) {
        const jsonPath = pathDep.jsonPath;
        let coordPairs = [];

        // For each lat instance in lats array,
        for (i = 0; i < coords[0].length; i++) {
            // init let & lon, and set to value of index.
            // but if the value is undefined, default to N/A
            const lat = coords[0][i] !== undefined ? coords[0][i] : 'N/A';
            const lon = coords[1][i] !== undefined ? coords[1][i] : 'N/A';

            // append coord pair to coordPairs array
            coordPairs.push({ lat, lon });
        }
        
        // try to do the rest,
        try {
            let existingJSONData = [];
            // Does JSON file exist?
            if (fileHandle.doesFileAlreadyExist(jsonPath)) {
                const fileContent = fs.readFileSync(jsonPath, 'utf-8');
                if (fileContent.trim()) {  // Only parse if file is not empty
                    existingJSONData = JSON.parse(fileContent);
                }
            }
            
            const newEntry = {
                "id": Date.now().toString(),
                "fileName": fileName,
                "attributes": attributes,
                "summary": overview.attributes?.summary || "No Overview available",
                "dims": dimensions,
                "vars": variables,
                "coords": coordPairs
            };
            
            // add new entry to existing data, and write to JSON file asynchronously
            existingJSONData.push(newEntry);
            await fs.promises.writeFile(jsonPath, JSON.stringify(existingJSONData, null, 2));
            fileHandle.reparseSimpleData(); // Update in-memory data after writing to file
            console.log("Data saved to simpleData.json");
            DOM.hideLoadingScreen(); // Hide loading screen after data is saved

        } catch (error) {
            console.error("Error saving to simpleData.json:", error);
            DOM.hideLoadingScreen(); // Hide loading screen on error
        }
    }

     </script>

<script>
    // Initial load
    DOM.loadSideBar_Glider(appState, ModuleDependencies["DOM"], DOM.displayDatasetInfo);
    
    // Hide loading screen after initial page load
    window.addEventListener('load', function() {
        setTimeout(DOM.hideLoadingScreen, 500); // Minimum loading time
    });
    
    document.getElementById("bannerButton1").addEventListener("click", function() {
        document.getElementById("avatar").click();
    });
    
    // File inputed (added)
    document.getElementById("avatar").addEventListener("change", function() {
    if (this.files.length > 0) {
        const file = this.files[0];
        const fileInput = this; // Store reference to reset later
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const destPath = path.join(pathDep.savedDataPath, file.name);
                fs.writeFileSync(destPath, Buffer.from(e.target.result));
                console.log("New File copied to savedData:", destPath);

                DOM.showLoadingScreen(); // Show loading screen BEFORE Python call
                
                // Give browser time to render loading screen before Python processing
                setTimeout(() => {
                    integrations.callPyFunc('open', [destPath], { timeoutMs: 120000 }).then(result => {
                        console.log("New File Loaded into memory");
                        
                        // Give browser time to render loading screen before starting intensive work
                        setTimeout(() => {
                            Promise.all([
                                integrations.callPyFunc('getOverview'),
                            ]).then(async ([overview]) => {
                                
                                // Save all data to JSON (now async)
                                await saveDatasetToJSON(file.name, overview.dimensions, overview.variables, overview, overview.coordinates, overview.attributes);
                                
                                // Create marker for the newly added file
                                const coords = overview.coordinates;
                                if (coords && coords[0] && coords[0].length > 0 && coords[1] && coords[1].length > 0) {
                                    const lat = coords[0][0];
                                    const lon = coords[1][0];
                                    const popupContent = DOM.leaf_buildPopupContent(
                                        file.name, 
                                        lat, 
                                        lon, 
                                        JSON.stringify(overview.dimensions)
                                    );
                                    DOM.leaf_insertDataMarker(appState, lat, lon, popupContent, {}, file.name);
                                    console.log(`Marker created for newly added file: ${file.name}`);
                                }
                                
                                DOM.loadSideBar_Glider(appState, ModuleDependencies["DOM"], DOM.displayDatasetInfo);
                                
                                // Reset file input so same file can be selected again
                                fileInput.value = '';
                            }).catch(error => {
                                console.error("Error gathering dataset info:", error);
                                DOM.hideLoadingScreen(); // Hide loading screen on error
                            });
                        }, 100); // 100ms delay to ensure browser paints loading screen

                    }).catch(error => {
                        console.error("Error calling Python function:", error);
                        DOM.hideLoadingScreen(); // Hide loading screen on error
                    });
                }, 100); // 100ms delay to ensure browser paints loading screen before Python call
            } catch (err) {
                console.error("Error saving file:", err);
            }
        };
        reader.readAsArrayBuffer(file);
    }
});

    document.getElementById("DeleteFileButton").addEventListener("click", async function() {
        let currentTargetFile = Array.from(appState.selectedFiles)[0];
        console.log("Delete button clicked= " + currentTargetFile);
        
        // Close the dataset in Python before deleting the file
        try {
            await integrations.callPyFunc('close');
            console.log("Dataset closed in Python");
        } catch (error) {
            console.error("Error closing dataset:", error);
        }
        
        // Remove from UI and data
        DOM.leaf_removeMapMarker(appState, currentTargetFile);
        DOM.dom_removeSidebarEntry(currentTargetFile);
        fileHandle.deleteEntryInSimpleData(currentTargetFile);
        fileHandle.deleteDataFile(currentTargetFile);
        appState.selectedFiles.delete(currentTargetFile);
        
        // Update allFiles list
        appState.allFiles = fileHandle.listSavedDataFiles(
            pathDep.resolveToProperDataPath(__dirname, 'savedData'), 
            '.nc'
        );
        console.log('File deleted and state updated');

        DOM.dom_clearElementInnerHTML_UsingString("datasetInfoCardWrapper");
        DOM.dom_clearElementInnerHTML_UsingString('datasetAttrCardWrapper');
        DOM.dom_clearElementInnerHTML_UsingString('datasetVarsCardWrapper');
        DOM.dom_SetElementInnerHTML_UsingString("dataFileHeader", "(Click on a data file to view)");
    });

</script>

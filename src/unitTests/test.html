<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- changed class -> id -->
    <div id="main"></div>
    <div id="main2"></div>
    
</body>
<style>
    .main, #main {
        width: 600px;
        height: 400px;
    }
    #main2 {
        width: 600px;
        height: 400px;
    }
</style>
<script type="module">
    const { spawn } = require('node:child_process');
    const path = require('node:path');

    const py = spawn("python", [path.join(__dirname, "../common/pythonProcess.py")]);

    let pendingResolve = null, buffer = "", queue = Promise.resolve();

    py.stdout.on("data", d => {
        buffer += d.toString();
        const parts = buffer.split("\n");
        buffer = parts.pop();
        for (const line of parts) {
            if (!line.trim()) continue;
            try {
                const msg = JSON.parse(line);
                if (pendingResolve) { pendingResolve(msg); pendingResolve = null; }
            } catch (e) { console.error("Parse error:", line, e); }
        }
    });

    py.stderr.on("data", d => console.error("PY Error:", d.toString()));

    function exec(cmd, args = []) {
      return (queue = queue.then(() => new Promise(resolve => {
        pendingResolve = resolve;
        py.stdin.write(JSON.stringify({ cmd, args }) + "\n");
      })));
    }


    // Open once (queued), then your existing lines will work
    await exec("open", [path.join(__dirname, "../../savedData/GL_PR_PF_1902604.nc")]);

    console.log((await exec("getDimensions")).result);
    console.log((await exec("getVariables")).result);
    console.log((await exec("getDimensionData", ["DEPTH"])).result);














    // use an ESM build via CDN (or a relative ./node_modules path served by your dev server)
    import * as echarts from 'https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.esm.js';

    // Create the echarts instance
    var myChart = echarts.init(document.getElementById('main'));
    var myChart2 = echarts.init(document.getElementById('main2'));

    // Draw the chart
    myChart.setOption({
      title: { text: 'ECharts Getting Started Example' },
      tooltip: {},
      xAxis: { data: ['shirt', 'cardigan', 'chiffon', 'pants', 'heels', 'socks'] },
      yAxis: {},
      series: [{ name: 'sales', type: 'line', data: [5, 20, 36, 10, 10, 20, 20, 36, 10, 10, 20] }]
    });

    myChart2.setOption({
      title: { text: 'ECharts Getting Started Example 2' },
      tooltip: {},
      xAxis: { data: ['shirt', 'cardigan', 'chiffon', 'pants', 'heels', 'socks'] },
      yAxis: {},
      series: [{ name: 'sales', type: 'bar', data: [15, 10, 26, 30, 40, 50, 20, 36, 10, 10, 20] }]
    });

    // This is what we have been looking for.
    myChart.group = 'group1';
    myChart2.group = 'group1';
    echarts.connect('group1');
</script>
